apiVersion: batch/v1
kind: CronJob
metadata:
  name: trend-worker-daily
  namespace: trend-platform
spec:
  # Cron format: minute hour day-of-month month day-of-week
  # "0 2 * * *" means run once daily at 02:00 UTC.
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: trend-sa
          containers:
            - name: worker
              image: REGION-docker.pkg.dev/PROJECT_ID/ImageREPO_NAME/worker:latest
